name: Deploy Dev and Prod Containers To Hostup

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digital-path-technologies/ravine-dairies

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Test GHCR login
        run: |
          echo ${{ secrets.PAT_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/digital-path-technologies/ravine-dairies:prod-latest || echo "Pull failed (expected if not pushed yet)"

      - name: Build and push PROD image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/digital-path-technologies/ravine-dairies:prod-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.ravinedairies.co.ke/api/v1
            NEXT_PUBLIC_ENVIRONMENT=production

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTUP_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.HOSTUP_SSH_PRIVATE_KEY }}
          script: |
            set -e

            #####################################
            # CONFIG
            #####################################
            IMAGE_NAME="ghcr.io/digital-path-technologies/ravine-dairies"
            TAG="${{ github.sha }}"

            DEV_PORT=3008
            PROD_PORT=3009

            DEV_CONTAINER="ravine-new-ui-dev-${TAG}"
            PROD_CURRENT="ravine-new-ui-prod-current"
            PROD_STASH="ravine-new-ui-prod-stash-${TAG}"

            MAX_RETRIES=30

            #####################################
            # AUTH
            #####################################
            echo "Logging into GitHub Container Registry..."
            echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            #####################################
            # PULL IMAGE
            #####################################
            echo "Pulling prod image..."
            docker pull ${IMAGE_NAME}:prod-${TAG}

            #####################################
            # CLEAN UP OLD DEV CONTAINERS (SAFETY)
            #####################################
            echo "Cleaning up old DEV containers..."
            docker rm -f $(docker ps -a --filter "name=ravine-new-ui-dev-" -q) 2>/dev/null || true

            #####################################
            # START DEV CONTAINER (GATE)
            #####################################
            echo "Starting DEV container..."
            docker run -d \
              --name ${DEV_CONTAINER} \
              -p ${DEV_PORT}:3000 \
              -e NEXT_PUBLIC_API_BASE_URL="https://api.ravinedairies.co.ke/api/v1" \
              -e NEXT_PUBLIC_ENVIRONMENT="production" \
              ${IMAGE_NAME}:prod-${TAG}

            echo "Waiting for DEV health..."
            DEV_OK=false
            for i in $(seq 1 $MAX_RETRIES); do
              if curl -fs http://localhost:${DEV_PORT}/api/health >/dev/null; then
                DEV_OK=true
                break
              fi
              sleep 1
              echo -n "."
            done
            echo ""

            if [ "$DEV_OK" != true ]; then
              echo "DEV health failed — aborting deploy"
              docker logs ${DEV_CONTAINER} || true
              docker rm -f ${DEV_CONTAINER} || true
              exit 1
            fi

            echo "DEV passed health check ✅"

            #####################################
            # STASH CURRENT PROD CONTAINER
            #####################################
              echo "Stashing current PROD container..."
            
            docker rm -f ${PROD_STASH} 2>/dev/null || true
              
            if docker ps -a --format '{{.Names}}' | grep -q "^${PROD_CURRENT}$"; then
              docker stop ${PROD_CURRENT} || true
              docker rename ${PROD_CURRENT} ${PROD_STASH} || true
            fi

            # Add retry logic for waiting until the container is removed
            for i in $(seq 1 5); do
              if ! docker ps -a --format '{{.Names}}' | grep -q "^${PROD_CURRENT}$"; then
                break
              fi
              echo "Waiting for ${PROD_CURRENT} container removal..."
              sleep 2
            done

            #####################################
            # CLEAN UP OLD PROD STASH CONTAINERS
            #####################################
            echo "Cleaning up old PROD stash containers..."
            docker ps -a --filter "name=ravine-new-ui-prod-stash-" --format '{{.Names}}' | xargs -r docker rm -f || true

            #####################################
            # START NEW PROD CONTAINER
            #####################################
            echo "Starting NEW PROD container..."
            docker run -d \
              --name ${PROD_CURRENT} \
              -p ${PROD_PORT}:3000 \
              -e NEXT_PUBLIC_API_BASE_URL="https://api.ravinedairies.co.ke/api/v1" \
              -e NEXT_PUBLIC_ENVIRONMENT="production" \
              --restart unless-stopped \
              ${IMAGE_NAME}:prod-${TAG}

            #####################################
            # VERIFY PROD CONTAINER HEALTH
            #####################################
            echo "Waiting for PROD health..."
            PROD_OK=false
            for i in $(seq 1 $MAX_RETRIES); do
              if curl -fs http://localhost:${PROD_PORT}/api/health >/dev/null; then
                PROD_OK=true
                break
              fi
              sleep 1
              echo -n "."
            done
            echo ""

            if [ "$PROD_OK" != true ]; then
              echo "PROD failed — rolling back deployment!"

              docker rm -f ${PROD_CURRENT} || true

              if docker ps -a --format '{{.Names}}' | grep -q "^${PROD_STASH}$"; then
                docker rename ${PROD_STASH} ${PROD_CURRENT}
                docker start ${PROD_CURRENT}
              fi

              docker rm -f ${DEV_CONTAINER} || true
              exit 1
            fi

            echo "PROD is healthy ✅"

            #####################################
            # CLEAN UP DEV CONTAINER
            #####################################
            echo "Cleaning up DEV container..."
            docker rm -f ${DEV_CONTAINER}

            #####################################
            # CLEAN OLD STASH CONTAINERS (KEEP LAST 2)
            #####################################
            echo "Cleaning up old PROD stash containers (keeping last 2)..."
            docker ps -a --filter "name=ravine-new-ui-prod-stash-" --format '{{.Names}}' | tail -n +3 | xargs -r docker rm -f || true

            #####################################
            # FINAL STATUS
            #####################################
            echo ""
            echo "Deployment complete 🚀"
            docker ps --filter "name=ravine-new-ui" --format "table {{.Names}}\t{{.Ports}}\t{{.Status}}"
